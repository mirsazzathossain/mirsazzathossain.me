name: Sync Availability

on:
  schedule:
    - cron: "0 0 * * *"  # midnight UTC = 06:00 Dhaka (UTC+6)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Sync availability from Google Calendar
        run: python .github/scripts/sync_availability.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/data/about_availability.json || (
            git add src/data/about_availability.json &&
            git commit -m "chore: sync weekly availability [skip ci]"
          )

      - name: Push
        run: git push
